# BoomMan 配置文件
# 卡顿区块自动重置插件

# 监控设置
monitor:
  # 是否启用监控
  enabled: true
  # 检查间隔 (tick), 20 tick = 1 秒
  check-interval: 20

# 卡顿阈值设置
thresholds:
  # 区块居住时间(inhabited time)超过此值触发重置
  # 居住时间是区块被占用的时间(以tick计)，1秒=20tick
  # 数值越大表示区块越繁忙，建议根据服务器负载调整
  tick-time-ms: 6000
  # 实体数量超过此值触发重置
  # 正常刷怪塔约100-200实体，严重卡顿通常500+
  # 建议: 普通服务器500-800，低配服务器可降至400
  entity-count: 600
  # 方块实体数量超过此值触发重置
  # 方块实体每tick需处理，大量方块实体会严重卡服
  # 建议: 普通服务器200-300，技术服可适当提高
  tile-entity-count: 250

# 重置设置
reset:
  # 是否启用自动重置 (true: 检测到卡顿自动重置, false: 仅记录不重置)
  auto-reset: false
  # 是否自动传送区块内的玩家到出生点
  teleport-players: true
  # 重置前警告秒数 (玩家会收到标题和聊天警告)
  before-reset-warning: 10
  # 同一区块重置冷却时间 (秒), 防止频繁重置
  cooldown-seconds: 120
  # 排除的世界列表 (这些世界不会被监控)
  exclude-worlds:
    - world_nether
    - world_the_end

# CoreProtect 相关设置
coreprotect:
  # 是否在重置前自动保存快照 (用于恢复)
  auto-snapshot: true
  # 恢复操作超时时间 (秒)
  restore-timeout: 300

# BStats 统计设置
bstats:
  # 是否启用匿名统计 (帮助开发者改进插件)
  enabled: true

# 数据库设置
database:
  # 数据库类型: sqlite 或 mysql
  type: sqlite
  # MySQL 连接设置 (仅当 type 为 mysql 时生效)
  host: localhost
  port: 3306
  name: boomman
  username: root
  password: ""
